version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    labels:
      - "type: ci"
      - "trust: maintainer-only"
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - "type: ci"
      - "trust: maintainer-only"
    commit-message:
      prefix: "ci"
