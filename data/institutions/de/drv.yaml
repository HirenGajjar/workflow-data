notes: "DRV is a network of regional carriers plus DRV Bund (federal). For Luxembourg frontaliers (~55,000 daily commuters), DRV Rheinland-Pfalz and DRV Saarland are typically the competent carriers. DRV organises international advisory days with Luxembourg CNAP representatives. Survivor pension requires 5-year qualifying period and marriage/partnership at time of death."
