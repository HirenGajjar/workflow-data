id: source:eu:social-security-coordination
object_type: Source
title: "EU Social Security Coordination Regulation (EC 883/2004)"
title_fr: "Règlement de coordination des systèmes de sécurité sociale (CE 883/2004)"
title_de: "EU-Verordnung zur Koordinierung der sozialen Sicherheit (EG 883/2004)"
description: "EU Regulation 883/2004 coordinating social security systems across member states, including survivor pension routing for cross-border workers and their families. Determines which country's pension authority is responsible when the deceased worked across borders."
description_fr: "Règlement UE 883/2004 coordonnant les systèmes de sécurité sociale entre les États membres, notamment le versement de la pension de survie pour les travailleurs frontaliers. Détermine l'autorité compétente lorsque le défunt a travaillé dans plusieurs pays."
description_de: "EU-Verordnung 883/2004 zur Koordinierung der sozialen Sicherheit zwischen den Mitgliedstaaten, einschließlich der Hinterbliebenenrentenregelung für Grenzgänger. Bestimmt die zuständige Rentenbehörde bei grenzüberschreitender Erwerbstätigkeit."
