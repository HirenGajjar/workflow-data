notes: "Key provisions: Art. 21 (habitual residence rule), Art. 22 (choice of nationality law), Art. 62-73 (European Certificate of Succession). Applies in all EU member states except Denmark and Ireland for succession matters. Luxembourg applies Brussels IV as directly applicable EU law."
