title: "EU Succession Regulation (Brussels IV)"
title_fr: "Règlement successoral européen (Bruxelles IV)"
title_de: "Europäische Erbrechtsverordnung (Brüssel IV)"
description: "EU Regulation 650/2012 establishing that cross-border succession is governed by the law of the country of habitual residence at death, unless the deceased explicitly chose their nationality's law. Introduces the European Certificate of Succession valid across all EU member states."
description_fr: "Règlement UE 650/2012 établissant que la succession transfrontalière est régie par le droit du pays de résidence habituelle au décès, sauf choix exprès du droit national. Introduit le Certificat Successoral Européen (CSE) valable dans tous les États membres."
description_de: "EU-Verordnung 650/2012, nach der grenzüberschreitende Erbfolge dem Recht des gewöhnlichen Aufenthaltsstaates zum Todeszeitpunkt unterliegt, sofern keine ausdrückliche Rechtswahl getroffen wurde. Führt das Europäische Nachlasszeugnis (ENZ) ein."
