notes: "Germany is the second largest frontalier corridor for Luxembourg (~55,000 daily commuters). Key cross-border facts: DRV survivor pension requires marriage/partnership at death and 5-year qualifying period; Sterbevierteljahr provision grants 3 months at deceased's full pension rate with no income offset after death; DRV coordinates with CNAP via EU social security coordination; DRV provides international advisory days for frontaliers; succession governed by Brussels IV habitual residence rule."
