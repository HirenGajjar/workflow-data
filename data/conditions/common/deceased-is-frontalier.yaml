id: condition:deceased-is-frontalier
object_type: Condition
label: "The deceased was a cross-border worker (frontalier)"
condition_type: cross_border
jurisdiction:
  country: LU
  region: null
  municipality: null
expression:
  field: deceased_work_country
  operator: not_equals
  value: LU
human_readable: "The deceased commuted across national borders for work, living in one country while employed in another."
source_ids:
  - source:eu:social-security-coordination
verification_status: discovered
provenance:
  created_at: "2026-05-28"
  created_by: "HirenGajjar"
  updated_at: null
  updated_by: null
notes: "Affects survivor pension routing. Under EC 883/2004, survivor pension is typically paid by the country of the deceased's last employment. Approximately 225,000 frontaliers commute to Luxembourg daily: France (~120,000), Germany (~55,000), Belgium (~50,000)."
