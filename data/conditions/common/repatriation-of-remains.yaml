notes: "Requires a laissez-passer mortuaire (mortuary pass) issued by the Luxembourg commune. For EU countries, the 1973 Strasbourg Convention on the Transfer of Mortal Remains applies. Funeral director typically coordinates documentation. Cremated remains have fewer cross-border restrictions than body transport."
