notes: "Triggers additional cross-border checks. Under Brussels IV Art. 21, succession is governed by habitual residence law — but nationality may matter if the deceased chose their nationality's law under Art. 22. Relevant for approximately 47% of Luxembourg residents who are foreign nationals."
